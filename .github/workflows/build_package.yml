name: Build Package
on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      image_tag:
        required: true
        type: string


jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: ghcr.io/${{ github.repository }}/vitasdk:${{ inputs.image_tag }}
    if: inputs.package != '__dummy__'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: package
          merge-multiple: true

      - name: Install dependencies into sysroot
        run: |
          export VITASDK=/usr/local/vitasdk
          mkdir -p $VITASDK/arm-vita-eabi
          
          # Function to get all recursive dependencies
          get_deps() {
            local pkg=$1
            [ -f "$pkg/VITABUILD" ] || return 0
            local deps=$(bash -c "source $pkg/VITABUILD && echo \${depends[@]}")
            for d in $deps; do
              echo $d
              get_deps $d
            done
          }
          
          if [ -d "package" ]; then
            ALL_DEPS=$(get_deps ${{ inputs.package }} | sort -u)
            echo "Recursive dependencies: $ALL_DEPS"
            
            WANT_111=$(echo "$ALL_DEPS" | grep -q "openssl-1.1.1" && echo "yes" || echo "no")
            WANT_102=$(echo "$ALL_DEPS" | grep -qE "^openssl$" && echo "yes" || echo "no")
            
            for file in package/*.tar.xz; do
              if [ -f "$file" ]; then
                pkgname=$(basename "$file" .tar.xz)
                
                # If package is an explicit dependency, always install it
                if echo "$ALL_DEPS" | grep -qE "^$pkgname$"; then
                  tar -C $VITASDK/arm-vita-eabi/ -xvf "$file"
                  continue
                fi
                
                # Otherwise, handle special cases or just install if no conflict
                if [ "$pkgname" == "openssl" ] && [ "$WANT_111" == "yes" ]; then continue; fi
                if [ "$pkgname" == "openssl-1.1.1" ] && [ "$WANT_102" == "yes" ]; then continue; fi
                
                tar -C $VITASDK/arm-vita-eabi/ -xvf "$file"
              fi
            done
          fi

      - name: Build package
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          bash ./build.sh ${{ inputs.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename package
        run: |
          export FILE=`echo ${{ inputs.package }}/*-arm.tar.xz`
          mv $FILE ${{ inputs.package }}/${{ inputs.package }}.tar.xz
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}
          path: ${{ inputs.package }}/${{ inputs.package }}.tar.xz
          if-no-files-found: error
